backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

publish_mode: editorial_workflow

site_url: https://dashing-mochi-f1c5a0.netlify.app

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/pages/home.json"
        format: json
        fields:
          # ── Hero ──────────────────────────────────
          - { label: "Hero Heading", name: "heroHeading", widget: "string" }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "text" }
          - { label: "Hero Button Text", name: "heroButtonText", widget: "string" }
          - { label: "Hero Background Image", name: "heroImage", widget: "image", required: false }

          # ── About ─────────────────────────────────
          - { label: "About Heading", name: "aboutHeading", widget: "string" }
          - { label: "About Text", name: "aboutText", widget: "text" }
          - { label: "About Image", name: "aboutImage", widget: "image", required: false }

          # ── Services ──────────────────────────────
          - { label: "Services Section Heading", name: "servicesHeading", widget: "string" }
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }

          # ── Gallery ───────────────────────────────
          - { label: "Gallery Heading", name: "galleryHeading", widget: "string" }
          - label: "Gallery Images"
            name: "galleryImages"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }

          # ── Contact ───────────────────────────────
          - { label: "Contact Heading", name: "contactHeading", widget: "string" }
          - { label: "Email Address", name: "contactEmail", widget: "string" }
          - { label: "Phone Number", name: "contactPhone", widget: "string", required: false }
          - { label: "Address", name: "contactAddress", widget: "string", required: false }

          # ── Footer ────────────────────────────────
          - { label: "Footer Text", name: "footerText", widget: "string" }
